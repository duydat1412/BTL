# ==============================================================
# CẤU HÌNH SERVER - Auction System
# ==============================================================
# File này giống như "bảng điều khiển" của server.
# Spring Boot tự đọc file này khi khởi động.
# ==============================================================

# --- Port ---
# Server sẽ chạy trên port 8080 (mặc định)
# Truy cập: http://localhost:8080
server.port=8080

# --- Tên ứng dụng ---
spring.application.name=auction-server

# ==============================================================
# CẤU HÌNH DATABASE (H2 - Database nhúng)
# ==============================================================
# H2 là database chạy ngay trong ứng dụng Java, không cần cài đặt
# MySQL, PostgreSQL hay bất kỳ phần mềm nào khác.
#
# Dữ liệu được lưu vào file: ./data/auctiondb
# (tạo tự động trong thư mục project)
# ==============================================================

# URL kết nối database
# jdbc:h2:file: = lưu vào file (không mất dữ liệu khi tắt server)
spring.datasource.url=jdbc:h2:file:./data/auctiondb

# Driver: class Java xử lý kết nối tới H2
spring.datasource.driver-class-name=org.h2.Driver

# Tên đăng nhập và mật khẩu database (chỉ dùng local)
spring.datasource.username=sa
spring.datasource.password=

# ==============================================================
# H2 CONSOLE - Giao diện web xem database
# ==============================================================
# Bật lên để xem dữ liệu trong database qua trình duyệt
# Truy cập: http://localhost:8080/h2-console
# JDBC URL nhập: jdbc:h2:file:./data/auctiondb
# ==============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==============================================================
# KHỞI TẠO DATABASE TỰ ĐỘNG
# ==============================================================
# Khi server khởi động, Spring Boot sẽ tự chạy file SQL
# trong src/main/resources/ để tạo bảng (nếu có).
# mode=always = luôn chạy script khởi tạo
# ==============================================================
spring.sql.init.mode=always
